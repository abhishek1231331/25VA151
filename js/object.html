<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Objects in JavaScript</title>
</head>
<body>
    <script>
        // Object is a collection of key-value pairs.

        // Create an object using literal way...
        let student = {
            name: "abhishek",
            age: 19,
            isMarried: false,
            address: {
                streetNo: 25,
                area: "om vihar",
                city: "612",
                pincode: 226011
            },
            course: "Btech",
            branch: "CSE",
            year: 2025,
            getInfo: function() {
                return "My education detail is " + this.branch;
            },
            subjects: ["Maths", "Hindi", "Science", "English"],
            examDone: null
        };

        // Example usage:
        console.log(student.getInfo());   // My education detail is CSE
        console.log(student.subjects);    // ["Maths", "Hindi", "Science", "English"]

        // Find any key in your object
        console.log("name" in student);   // true

        // Delete any key from object
        console.log(delete student.name); // true
        console.log(student);             // name removed

        // Find length of object
        let keysLength = Object.keys(student); // Corrected "object" → "Object"
        console.log(keysLength.length);        // Number of keys in student

        
    </script>
</body>
</html>
