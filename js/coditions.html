<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>condtions in js</title>
</head>
<body>
    <script>
        // conditional statements are those statements which controls flow of execution.
           // IF
           let age=23;
           if(age<=20){
            console.log("not eligible for marriage");
           }
           console.log("eligible for marriage");

           // IF ELSE

           let myAge=24;
           if(age>=18){
            console.log("you can do vote casting");
           }
           else{
            console.log("wait for next time");
           }

           //switch statements : evaluates an expression and executes the code
           // block of matching case also

           let grade=50;
           switch(grade){
            case 'A' : result ="first division";
            break;
            case 'B' : result ="Second division";
            break;
            case 'C' : result ="thirsd division";
            break;
            default : result ="fail";
           }
           console.log(result);

    </script>
    
</body>
</html>
